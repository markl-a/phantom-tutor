name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: install dry-run
        run: python -m pip install -e . --dry-run --no-deps

      - name: wheel build
        run: python -m pip wheel . --no-deps -w dist

      - name: Lint
        run: python -m ruff check phantom_tutor tests

      - name: public deterministic smoke
        run: |
          python -m phantom_tutor.cli demo-loop --out /tmp/phantom-tutor-demo --now 2026-06-26
          test -f /tmp/phantom-tutor-demo/manifest.json
          python -m phantom_tutor.cli learning-plan-demo --source /tmp/phantom-tutor-demo --out /tmp/phantom-tutor-plan --horizon-days 14
          test -f /tmp/phantom-tutor-plan/manifest.json
          python -m phantom_tutor.cli practice-scenario --source /tmp/phantom-tutor-demo --out /tmp/phantom-tutor-practice
          test -f /tmp/phantom-tutor-practice/manifest.json

      - name: Test
        run: python -m pytest -q

      - name: release-prep gate
        run: python -m pytest tests/test_release_prep_contract.py -q
